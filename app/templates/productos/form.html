{% extends "base.html" %}

{% block title %}{% if producto %}Editar{% else %}Nuevo{% endif %} producto - SmartGastro{% endblock %}

{% block content %}
<div class="card">
    <h1>{% if producto %}Editar producto{% else %}Nuevo producto{% endif %}</h1>
    <form method="post">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" value="{{ producto.nombre if producto else '' }}" required>

        <label for="precio">Precio</label>
        <input type="number" id="precio" name="precio" step="0.01" min="0.01"
               value="{{ producto.precio if producto else '' }}" required>

        <label for="stock">Stock</label>
        <input type="number" id="stock" name="stock" min="0"
               value="{{ producto.stock if producto else '' }}" required>

        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="{{ url_for('productos.listar') }}" class="btn btn-secondary">Volver</a>
    </form>
</div>
{% endblock %}
